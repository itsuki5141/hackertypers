<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker Typers - Hacker Style Typing Demo</title>
  <meta name="description" content="Type any key to generate hacker-style pseudo code in a terminal-like screen.">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <link rel="canonical" href="https://hackertypers.vercel.app/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Hacker Typers - Hacker Style Typing Demo">
  <meta property="og:description" content="Keyboard-driven hacker typer demo with random pseudo code output.">
  <meta property="og:url" content="https://hackertypers.vercel.app/">
  <meta name="twitter:card" content="summary">
  <style>
    :root {
      --bg: #040605;
      --panel: #0b110d;
      --grid: rgba(43, 255, 140, 0.06);
      --fg: #4cff9d;
      --fg-dim: #1f8f56;
      --warn: #ff466e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px),
        radial-gradient(1200px 700px at 20% 10%, #0b2615 0%, transparent 65%),
        radial-gradient(1200px 700px at 80% 90%, #04140b 0%, transparent 65%),
        var(--bg);
      background-size: 22px 22px, 22px 22px, auto, auto, auto;
      color: var(--fg);
      font-family: Consolas, "Cascadia Mono", "Courier New", monospace;
      display: grid;
      grid-template-rows: auto 1fr auto;
      text-shadow: 0 0 8px rgba(76, 255, 157, 0.3);
    }

    .top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid #123922;
      background: rgba(0, 0, 0, 0.5);
      font-size: 13px;
    }

    .left,
    .right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 8px var(--warn);
      display: inline-block;
      margin-right: 6px;
    }

    .badge {
      border: 1px solid #1e6039;
      background: var(--panel);
      padding: 3px 8px;
      color: var(--fg-dim);
    }

    #workspace {
      overflow: auto;
      padding: 18px 16px 28px;
      display: flex;
      min-height: 0;
    }

    #output {
      margin: 0;
      margin-top: auto;
      width: 100%;
      min-width: 0;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.3;
      font-size: clamp(13px, 1.8vw, 16px);
    }

    .cursor {
      display: inline-block;
      width: 9px;
      height: 1.1em;
      vertical-align: text-bottom;
      background: var(--fg);
      box-shadow: 0 0 10px rgba(76, 255, 157, 0.6);
      animation: blink 0.95s steps(1) infinite;
    }

    @keyframes blink {
      0%, 52% { opacity: 1; }
      52.01%, 100% { opacity: 0; }
    }

    .bottom {
      border-top: 1px solid #123922;
      padding: 8px 14px;
      font-size: 12px;
      color: var(--fg-dim);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: rgba(0, 0, 0, 0.55);
    }

    #alertBox {
      position: fixed;
      top: 14px;
      right: 14px;
      width: min(380px, calc(100vw - 28px));
      border: 1px solid #7d0d27;
      background: rgba(35, 0, 10, 0.94);
      color: #ff7e9b;
      padding: 12px;
      font-size: 13px;
      display: none;
      z-index: 10;
    }

    #alertBox.show {
      display: block;
      animation: pulse 0.25s linear 2;
    }

    @keyframes pulse {
      0% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      50% { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="left">
      <span><span class="dot"></span>SECURE TERMINAL // DEMO</span>
      <span class="badge">PROFILE: root@simulator</span>
    </div>
    <div class="right">
      <span id="chars">CHARS: 0</span>
      <span id="rate">RATE: 0/s</span>
      <span id="progress">SYNC: 0%</span>
    </div>
  </header>

  <section id="workspace">
    <pre id="output" aria-live="polite"></pre>
  </section>

  <footer class="bottom">
    <span>Any key: generate code</span>
    <span>Backspace: delete chunk</span>
    <span>Esc: reset screen</span>
  </footer>

  <aside id="alertBox"></aside>

  <script>
    const output = document.getElementById("output");
    const charsStat = document.getElementById("chars");
    const rateStat = document.getElementById("rate");
    const progressStat = document.getElementById("progress");
    const alertBox = document.getElementById("alertBox");
    const workspace = document.getElementById("workspace");

    const source = `#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#include <time.h>

typedef struct {
  char user[32];
  char role[16];
  int clearance;
  long timestamp;
} Session;

static const char* channels[] = {
  "alpha-link", "delta-node", "echo-grid", "sigma-router", "core-gateway"
};

int verify_packet(const char* packet) {
  if (packet == NULL) return 0;
  int score = 0;
  for (size_t i = 0; i < strlen(packet); i++) {
    score += ((int)packet[i] * (int)(i + 1)) % 97;
  }
  return score % 13 != 0;
}

void encode_payload(char* dst, const char* src) {
  size_t n = strlen(src);
  for (size_t i = 0; i < n; i++) {
    dst[i] = (char)((src[i] + (i % 9) + 3) & 0x7F);
  }
  dst[n] = '\\0';
}

void sync_route(Session* s, const char* route) {
  if (!s || !route) return;
  char payload[128];
  encode_payload(payload, route);
  printf("[SYNC] user=%s route=%s clearance=%d\\n", s->user, payload, s->clearance);
}

int main(void) {
  srand((unsigned int)time(NULL));
  Session s;
  snprintf(s.user, sizeof(s.user), "operator_%d", rand() % 900 + 100);
  snprintf(s.role, sizeof(s.role), "maintainer");
  s.clearance = rand() % 5 + 1;
  s.timestamp = time(NULL);

  for (size_t i = 0; i < sizeof(channels) / sizeof(channels[0]); i++) {
    if (verify_packet(channels[i])) {
      sync_route(&s, channels[i]);
    }
  }
  printf("[DONE] session complete\\n");
  return 0;
}
`;

    let printed = "";
    let keyHits = 0;
    let keyHitsLastSec = 0;
    let lastSecond = Date.now();
    let indentLevel = 0;

    const verbs = ["scan", "probe", "inject", "bypass", "route", "trace", "decrypt", "sync", "forge", "mask"];
    const objs = ["node", "gateway", "session", "packet", "buffer", "channel", "cache", "kernel", "matrix", "proxy"];
    const funcs = ["verify_hash", "open_tunnel", "sync_route", "parse_frame", "hook_signal", "decode_block", "auth_check"];
    const flags = ["--stealth", "--rapid", "--safe-mode", "--ghost", "--ttl=30", "--deep"];
    const hex = "0123456789abcdef";

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function render() {
      output.innerHTML = escapeHtml(printed) + '<span class="cursor"></span>';
      workspace.scrollTop = workspace.scrollHeight;
      const progress = (keyHits * 3) % 101;
      charsStat.textContent = "CHARS: " + printed.length;
      progressStat.textContent = "SYNC: " + Math.min(progress, 100) + "%";
    }

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function hexStr(len) {
      let out = "";
      for (let i = 0; i < len; i++) out += hex[Math.floor(Math.random() * hex.length)];
      return out;
    }

    function makeCodeLine() {
      const type = Math.floor(Math.random() * 8);
      const pad = "  ".repeat(Math.max(indentLevel, 0));

      if (type === 0) return pad + "if (" + pick(objs) + ".status == 0x" + hexStr(2) + ") {";
      if (type === 1) return pad + pick(funcs) + "(" + pick(objs) + ", 0x" + hexStr(6) + ");";
      if (type === 2) return pad + "let " + pick(objs) + "_" + hexStr(3) + " = \"" + pick(verbs) + ":" + pick(objs) + "\";";
      if (type === 3) return pad + "exec --target " + pick(objs) + "_" + (10 + Math.floor(Math.random() * 90)) + " " + pick(flags);
      if (type === 4) return pad + "[" + hexStr(4) + "] " + pick(verbs).toUpperCase() + " -> " + pick(objs) + " :: ok";
      if (type === 5) return pad + "for (i=0; i<" + (2 + Math.floor(Math.random() * 6)) + "; i++) { " + pick(funcs) + "(frame[i]); }";
      if (type === 6) return pad + pick(objs) + ".token = sha1(\"" + hexStr(8) + "\").slice(0,8);";
      return pad + "/* " + pick(verbs) + " " + pick(objs) + " @" + hexStr(6) + " */";
    }

    function randomChunk() {
      const lines = 1 + Math.floor(Math.random() * 3);
      let chunk = "";

      for (let i = 0; i < lines; i++) {
        const roll = Math.random();

        if (roll < 0.12) {
          indentLevel = Math.max(indentLevel - 1, 0);
          chunk += "  ".repeat(indentLevel) + "}\n";
          continue;
        }

        const line = makeCodeLine();
        chunk += line + "\n";

        if (line.trim().endsWith("{") && Math.random() < 0.8) {
          indentLevel = Math.min(indentLevel + 1, 7);
        } else if (Math.random() < 0.08) {
          indentLevel = Math.max(indentLevel - 1, 0);
        }
      }

      return chunk;
    }

    function popAlert() {
      const alerts = [
        "ALERT: Trace routine simulated.",
        "WARNING: External ping detected (demo).",
        "NOTICE: Sandbox signature mismatch.",
        "INFO: Route hash auto-corrected."
      ];
      alertBox.textContent = alerts[Math.floor(Math.random() * alerts.length)];
      alertBox.classList.add("show");
      setTimeout(() => alertBox.classList.remove("show"), 1300);
    }

    function appendChunk() {
      printed += randomChunk();
      keyHits++;
      keyHitsLastSec++;
      if (keyHits % 60 === 0) popAlert();
      if (printed.length > 12000) {
        printed = printed.slice(3200);
      }
      render();
    }

    function deleteChunk() {
      printed = printed.slice(0, Math.max(printed.length - 12, 0));
      render();
    }

    function resetAll() {
      printed = "";
      keyHits = 0;
      render();
    }

    setInterval(() => {
      const now = Date.now();
      const elapsed = (now - lastSecond) / 1000;
      if (elapsed >= 1) {
        const rate = Math.round(keyHitsLastSec / elapsed);
        rateStat.textContent = "RATE: " + rate + "/s";
        keyHitsLastSec = 0;
        lastSecond = now;
      }
    }, 180);

    window.addEventListener("keydown", (event) => {
      if (event.ctrlKey || event.metaKey || event.altKey) return;

      if (event.key === "Escape") {
        resetAll();
        return;
      }

      if (event.key === "Backspace") {
        event.preventDefault();
        deleteChunk();
        return;
      }

      if (event.key.length === 1 || event.key === "Enter" || event.key === "Tab") {
        event.preventDefault();
        appendChunk();
      }
    });

    render();
  </script>
</body>
</html>
